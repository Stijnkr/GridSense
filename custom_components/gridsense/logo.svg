<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#0d1117"/>

  <!-- House outline -->
  <path d="M128 48 L196 104 L196 200 L60 200 L60 104 Z"
        stroke="#30363d" stroke-width="6" stroke-linejoin="round" fill="#161b22"/>

  <!-- Roof -->
  <path d="M44 112 L128 44 L212 112"
        stroke="#30363d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Solar panel (roof, yellow) -->
  <rect x="95" y="68" width="22" height="14" rx="2" fill="#f0c040" opacity="0.9"/>
  <rect x="121" y="68" width="22" height="14" rx="2" fill="#f0c040" opacity="0.9"/>
  <rect x="95" y="85" width="22" height="14" rx="2" fill="#f0c040" opacity="0.7"/>
  <rect x="121" y="85" width="22" height="14" rx="2" fill="#f0c040" opacity="0.7"/>

  <!-- Lightning bolt (centre, energy flow) -->
  <path d="M136 118 L118 148 L130 148 L120 178 L142 142 L130 142 Z"
        fill="#3fb950"/>

  <!-- Grid dots (corners, connected) -->
  <circle cx="80"  cy="170" r="5" fill="#58a6ff"/>
  <circle cx="176" cy="170" r="5" fill="#58a6ff"/>
  <circle cx="80"  cy="130" r="5" fill="#58a6ff"/>
  <circle cx="176" cy="130" r="5" fill="#58a6ff"/>
  <line x1="80"  y1="130" x2="80"  y2="170" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="176" y1="130" x2="176" y2="170" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="80"  y1="130" x2="176" y2="130" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="80"  y1="170" x2="176" y2="170" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
</svg>
